# Vaccination campaign — vaccination_2026 (upstream :3110)
# Install: ln -s .../vaccination.bangladeshpetassociation.com.conf /etc/nginx/sites-enabled/

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name vaccination.bangladeshpetassociation.com;

    include /etc/nginx/snippets/ssl-letsencrypt.conf;
    include /etc/nginx/snippets/security-headers.conf;

    access_log /var/log/nginx/bpa-vaccination.access.log combined buffer=32k flush=5s;
    error_log  /var/log/nginx/bpa-vaccination.error.log warn;

    limit_conn bpa_conn_per_ip 40;

    # Campaign app proxies /api/* → backend-api (see vaccination_2026 next.config.js)
    location ^~ /api/ {
        limit_req zone=bpa_general burst=40 nodelay;
        limit_req zone=bpa_api_auth burst=5 nodelay;
        limit_req_status 429;

        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://127.0.0.1:3000/api/;
    }

    location ^~ /_next/static/ {
        limit_req zone=bpa_static burst=200 nodelay;
        include /etc/nginx/snippets/proxy-nextjs.conf;
        proxy_pass http://bpa_vaccination;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ^~ /_next/image {
        limit_req zone=bpa_static burst=80 nodelay;
        include /etc/nginx/snippets/proxy-nextjs.conf;
        proxy_pass http://bpa_vaccination;
    }

    # Payment return URLs — no extra caching
    location ^~ /book/payment/ {
        limit_req zone=bpa_general burst=30 nodelay;
        include /etc/nginx/snippets/proxy-nextjs.conf;
        proxy_pass http://bpa_vaccination;
        add_header Cache-Control "no-store" always;
    }

    location / {
        limit_req zone=bpa_general burst=60 nodelay;
        limit_req_status 429;

        include /etc/nginx/snippets/proxy-nextjs.conf;
        proxy_pass http://bpa_vaccination;
    }
}
