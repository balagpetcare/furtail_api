# HTTP — ACME challenges + redirect to HTTPS
# Install path: /etc/nginx/sites-enabled/00-acme-and-redirect.conf

server {
    listen 80;
    listen [::]:80;
    server_name bangladeshpetassociation.com www.bangladeshpetassociation.com vaccination.bangladeshpetassociation.com;

    # Let's Encrypt HTTP-01
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
