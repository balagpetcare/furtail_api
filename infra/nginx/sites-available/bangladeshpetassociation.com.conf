# Primary marketing site — bpa-landing (upstream :3101)
# Install: ln -s .../bangladeshpetassociation.com.conf /etc/nginx/sites-enabled/

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name bangladeshpetassociation.com;

    include /etc/nginx/snippets/ssl-letsencrypt.conf;
    include /etc/nginx/snippets/security-headers.conf;

    # Logs
    access_log /var/log/nginx/bpa-landing.access.log combined buffer=32k flush=5s;
    error_log  /var/log/nginx/bpa-landing.error.log warn;

    limit_conn bpa_conn_per_ip 40;

    # Next.js immutable static assets — long cache + higher rate limit
    location ^~ /_next/static/ {
        limit_req zone=bpa_static burst=200 nodelay;
        limit_req_status 429;

        include /etc/nginx/snippets/proxy-nextjs.conf;
        proxy_pass http://bpa_landing;

        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ^~ /_next/image {
        limit_req zone=bpa_static burst=80 nodelay;
        include /etc/nginx/snippets/proxy-nextjs.conf;
        proxy_pass http://bpa_landing;
    }

    # Public files (favicon, manifest, opengraph)
    location ~* \.(?:ico|svg|webp|png|jpg|jpeg|gif|woff2?|webmanifest)$ {
        limit_req zone=bpa_static burst=80 nodelay;
        include /etc/nginx/snippets/proxy-nextjs.conf;
        proxy_pass http://bpa_landing;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # Optional — browser calls same-origin /api/v1 (reduces CORS). Requires bpa_api upstream.
    # location ^~ /api/v1/ {
    #     limit_req zone=bpa_general burst=40 nodelay;
    #     limit_req zone=bpa_api_auth burst=5 nodelay;
    #     include /etc/nginx/snippets/proxy-api.conf;
    #     proxy_pass http://bpa_api/api/v1/;
    # }

    # /vaccination bridge page is served by bpa-landing (SEO discovery route).
    # Do NOT 301 to subdomain unless marketing explicitly wants URL bar change.

    location / {
        limit_req zone=bpa_general burst=60 nodelay;
        limit_req_status 429;

        include /etc/nginx/snippets/proxy-nextjs.conf;
        proxy_pass http://bpa_landing;
    }
}

# www → apex
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.bangladeshpetassociation.com;

    include /etc/nginx/snippets/ssl-letsencrypt.conf;
    return 301 https://bangladeshpetassociation.com$request_uri;
}
