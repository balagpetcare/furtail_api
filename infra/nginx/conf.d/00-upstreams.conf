# BPA production upstreams — adjust host:port for Docker service names or multiple replicas.
# Default: Next.js apps bound to loopback on fixed dev/prod ports (3101 landing, 3110 campaign).

upstream bpa_landing {
    server 127.0.0.1:3101;
    keepalive 32;
}

upstream bpa_vaccination {
    server 127.0.0.1:3110;
    keepalive 32;
}

# Optional — uncomment if proxying API through frontends (see site configs).
# upstream bpa_api {
#     server 127.0.0.1:3000;
#     keepalive 64;
# }
