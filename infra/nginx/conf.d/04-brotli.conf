# Brotli — OPTIONAL. Requires ngx_brotli module.
# Debian/Ubuntu: apt install libnginx-mod-http-brotli-filter libnginx-mod-http-brotli-static
# If `nginx -t` fails, rename this file to 04-brotli.conf.disabled

brotli on;
brotli_comp_level 6;
brotli_min_length 256;
brotli_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/xml+rss
    application/vnd.ms-fontobject
    application/x-font-ttf
    font/opentype
    image/svg+xml;
