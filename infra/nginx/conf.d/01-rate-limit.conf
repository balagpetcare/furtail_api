# Rate limiting — tune limits per traffic profile after launch.

# General page/API traffic per client IP
limit_req_zone $binary_remote_addr zone=bpa_general:20m rate=30r/s;
limit_req_zone $binary_remote_addr zone=bpa_static:20m rate=120r/s;

# Stricter bucket for auth / OTP style endpoints (when proxied via /api/)
limit_req_zone $binary_remote_addr zone=bpa_api_auth:10m rate=10r/m;

# Connection cap per IP (mitigate slowloris)
limit_conn_zone $binary_remote_addr zone=bpa_conn_per_ip:10m;

# Apply burst to avoid punishing legitimate Next.js asset waterfalls
# burst=60 nodelay — allows short bursts; excess delayed or dropped per limit_req_status
