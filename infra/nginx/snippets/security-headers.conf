# Per-server security headers (include inside server { } blocks)

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
add_header X-XSS-Protection "0" always;

add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://connect.facebook.net https://www.clarity.ms; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://www.google-analytics.com https://www.facebook.com https://*.clarity.ms https://api.bangladeshpetassociation.com; frame-src 'self' https://*.sslcommerz.com https://*.eps.com.bd; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self';" always;

proxy_hide_header X-Powered-By;
