<!DOCTYPE html>
<html>
  <body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; color: #1f2937;">
    <h2 style="margin-bottom: 12px;">Changes Requested</h2>
    <p style="margin-top: 0;">Hello {{recipientName}},</p>
    <p>
      Changes were requested for your <strong>{{entityType}}</strong> verification of <strong>{{entityName}}</strong>.
    </p>
    <p><strong>Reviewer Note:</strong> {{notes}}</p>
    <p style="margin: 20px 0;">
      <a
        href="{{actionUrl}}"
        style="display: inline-block; padding: 10px 16px; border-radius: 6px; background: #d97706; color: #ffffff; text-decoration: none;"
      >
        Submit Corrections
      </a>
    </p>
    <p style="color: #6b7280; font-size: 12px;">This is an automated message from BPA.</p>
  </body>
</html>
