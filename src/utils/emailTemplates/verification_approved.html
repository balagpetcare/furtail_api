<!DOCTYPE html>
<html>
  <body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; color: #1f2937;">
    <h2 style="margin-bottom: 12px;">Verification Approved</h2>
    <p style="margin-top: 0;">Hello {{recipientName}},</p>
    <p>
      Your <strong>{{entityType}}</strong> verification for <strong>{{entityName}}</strong> has been approved.
    </p>
    <p>{{details}}</p>
    <p style="margin: 20px 0;">
      <a
        href="{{actionUrl}}"
        style="display: inline-block; padding: 10px 16px; border-radius: 6px; background: #16a34a; color: #ffffff; text-decoration: none;"
      >
        Open Verification Center
      </a>
    </p>
    <p style="color: #6b7280; font-size: 12px;">This is an automated message from BPA.</p>
  </body>
</html>
