services:
  bpa_db:
    image: postgres:16-alpine
    container_name: bpa_db
    environment:
      POSTGRES_USER: bpa_admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: bpa_pet_db
    ports:
      - "5432:5432"
    volumes:
      - bpa_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bpa_admin -d bpa_pet_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - bpa_net

  bpa-redis:
    image: redis:7-alpine
    container_name: bpa-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - bpa_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - bpa_net

  bpa-storage:
    image: quay.io/minio/aistor/minio:latest
    container_name: bpa-storage
    command: server /data --console-address ":9001" --license /minio.license
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - bpa_minio_data:/data
      - ./minio.license:/minio.license:ro
    networks:
      - bpa_net

  bpa_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bpa_api
    # Ensure DB tables exist before starting API (prevents P2021: table does not exist).
    # With volumes (.:/app + /app/node_modules), node_modules can be empty; install deps so socket.io etc. are available.
    command: sh -c "npm ci && npx prisma generate && npx prisma migrate deploy && npm run storage:init && npm run dev"
    env_file:
      - .env.docker
    ports:
      - "3000:3000"
    depends_on:
      bpa_db:
        condition: service_healthy
      bpa-storage:
        condition: service_started
    networks:
      - bpa_net
    # Dev-friendly: hot reload (optional). If you don't want bind-mount, comment these lines.
    volumes:
      - .:/app
      - /app/node_modules

  bpa_worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: bpa_app_api
    container_name: bpa_worker
    command: sh -c "npm ci && npx prisma generate && npm run worker:email"
    env_file:
      - .env.docker
    environment:
      REDIS_HOST: bpa-redis
      REDIS_PORT: "6379"
    depends_on:
      bpa_db:
        condition: service_healthy
      bpa-redis:
        condition: service_healthy
    networks:
      - bpa_net
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  bpa_pg_data:
  bpa_minio_data:
  bpa_redis_data:

networks:
  bpa_net:
    driver: bridge
